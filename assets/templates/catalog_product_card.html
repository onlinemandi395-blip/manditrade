<article class="mt-catalog-card mt-catalog-card--$view">
  <div class="mt-catalog-card__thumb-wrap">
    $thumbnail_markup
  </div>
  <div class="mt-catalog-card__body">
    <div class="mt-catalog-card__topline">
      <span class="mt-catalog-card__channel">$channel_label</span>
      <span class="mt-catalog-card__badge">$badge_label</span>
    </div>
    <h3 class="mt-catalog-card__title">$title</h3>
    <p class="mt-catalog-card__meta">$meta</p>
    <div class="mt-catalog-card__price-row">
      <strong class="mt-catalog-card__price">$price</strong>
      <span class="mt-catalog-card__promise">$promise_label</span>
    </div>
    <div class="mt-catalog-card__details">
      $details_markup
    </div>
  </div>
</article>
