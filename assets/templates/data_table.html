<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --mt-bg: rgba(0, 0, 0, 0.82);
      --mt-panel: rgba(12, 12, 12, 0.94);
      --mt-border: rgba(255, 255, 255, 0.12);
      --mt-text: #ffffff;
      --mt-text-soft: rgba(255, 255, 255, 0.72);
      --mt-accent: #d90429;
      --mt-accent-soft: rgba(217, 4, 41, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      color: var(--mt-text);
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }
    .mt-js-table {
      background: linear-gradient(180deg, rgba(18,18,18,0.96), rgba(8,8,8,0.96));
      border: 1px solid var(--mt-border);
      border-radius: 18px;
      overflow: hidden;
    }
    .mt-js-table__toolbar {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: center;
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--mt-border);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(217,4,41,0.08));
    }
    .mt-js-table__meta {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .mt-js-table__chip {
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      font-size: 12px;
      background: var(--mt-accent-soft);
      color: var(--mt-accent);
      border: 1px solid rgba(217, 4, 41, 0.28);
    }
    .mt-js-table__search {
      width: min(320px, 100%);
      border: 1px solid var(--mt-border);
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 0.7rem 0.8rem;
      color: var(--mt-text);
      outline: none;
    }
    .mt-js-table__search:focus {
      border-color: rgba(217, 4, 41, 0.42);
      box-shadow: 0 0 0 3px rgba(217, 4, 41, 0.12);
    }
    .mt-js-table__wrap {
      overflow: auto;
      max-height: 560px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }
    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: rgba(24, 24, 24, 0.98);
      color: var(--mt-text);
      text-align: left;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.8rem 0.9rem;
      border-bottom: 1px solid var(--mt-border);
    }
    tbody td {
      padding: 0.82rem 0.9rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--mt-text);
      font-size: 13px;
      vertical-align: top;
      word-break: break-word;
    }
    tbody tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.03);
    }
    tbody tr:hover {
      background: rgba(217, 4, 41, 0.1);
    }
    .mt-js-table__empty {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--mt-text-soft);
    }
    .mt-js-table__footer {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      padding: 0.85rem 1rem;
      color: var(--mt-text-soft);
      border-top: 1px solid var(--mt-border);
      font-size: 12px;
    }
    @media (max-width: 720px) {
      .mt-js-table__toolbar {
        flex-direction: column;
        align-items: stretch;
      }
      .mt-js-table__search {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="mt-js-table" id="$table_key">
    <div class="mt-js-table__toolbar">
      <div class="mt-js-table__meta">
        <div class="mt-js-table__chip">Table view</div>
        <div class="mt-js-table__chip" id="$table_key-stats">Loading...</div>
      </div>
      <input class="mt-js-table__search" id="$table_key-search" type="search" placeholder="Search any value..." />
    </div>
    <div class="mt-js-table__wrap">
      <table>
        <thead id="$table_key-head"></thead>
        <tbody id="$table_key-body"></tbody>
      </table>
      <div class="mt-js-table__empty" id="$table_key-empty" hidden>No rows found.</div>
    </div>
    <div class="mt-js-table__footer">
      <span>$escaped_title</span>
      <span id="$table_key-footer">Rendering records...</span>
    </div>
  </div>
  <script>
    const payload = $payload_json;
    const head = document.getElementById(`${payload.table_key}-head`);
    const body = document.getElementById(`${payload.table_key}-body`);
    const search = document.getElementById(`${payload.table_key}-search`);
    const stats = document.getElementById(`${payload.table_key}-stats`);
    const footer = document.getElementById(`${payload.table_key}-footer`);
    const empty = document.getElementById(`${payload.table_key}-empty`);

    const escapeHtml = (value) => String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");

    const renderHead = () => {
      head.innerHTML = `<tr>${payload.columns.map((column) => `<th>${escapeHtml(column)}</th>`).join("")}</tr>`;
    };

    const renderRows = (rows) => {
      if (!rows.length) {
        body.innerHTML = "";
        empty.hidden = false;
        footer.textContent = search.value.trim()
          ? `No matches found for "${search.value.trim()}".`
          : "No rows available.";
        stats.textContent = `0 / ${payload.rows.length} rows`;
        setFrameHeight();
        return;
      }
      empty.hidden = true;
      body.innerHTML = rows.map((row) => `
        <tr>
          ${payload.columns.map((column) => `<td>${escapeHtml(row[column] ?? "")}</td>`).join("")}
        </tr>
      `).join("");
      stats.textContent = `${rows.length} / ${payload.rows.length} rows`;
      footer.textContent = `Columns: ${payload.columns.length}`;
      setFrameHeight();
    };

    const filterRows = () => {
      const needle = search.value.trim().toLowerCase();
      if (!needle) {
        renderRows(payload.rows);
        return;
      }
      const filtered = payload.rows.filter((row) =>
        payload.columns.some((column) => String(row[column] ?? "").toLowerCase().includes(needle))
      );
      renderRows(filtered);
    };

    const setFrameHeight = () => {
      const height = Math.min(Math.max(document.body.scrollHeight + 12, 220), 760);
      if (window.parent) {
        window.parent.postMessage({
          type: "streamlit:setFrameHeight",
          height,
        }, "*");
      }
    };

    renderHead();
    renderRows(payload.rows);
    search.addEventListener("input", filterRows);
    window.addEventListener("load", setFrameHeight);
    window.addEventListener("resize", setFrameHeight);
  </script>
</body>
</html>
