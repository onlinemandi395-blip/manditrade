<section class="mt-login-hero mt-surface">
  <div class="mt-login-hero__brand">
    <div class="mt-login-hero__logo" aria-hidden="true">
      <span>M</span>
      <span>T</span>
    </div>
    <div class="mt-login-hero__brand-copy">
      <div class="mt-login-hero__eyebrow">MandiTrade</div>
      <h1 class="mt-login-hero__title">$title</h1>
      <p class="mt-login-hero__subtitle">$subtitle</p>
    </div>
  </div>
  <div class="mt-login-hero__rail">
    <div class="mt-login-hero__card">
      <span>For Businesses</span>
      <strong>Bring your offline products online</strong>
    </div>
    <div class="mt-login-hero__card">
      <span>For Buyers</span>
      <strong>Browse, order, and track with clarity</strong>
    </div>
    <div class="mt-login-hero__card">
      <span>For Teams</span>
      <strong>Manage products, payments, shipments, and records</strong>
    </div>
  </div>
</section>
