<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: #ffffff;
    }
    .mt-dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      padding: 0.05rem 0.05rem 0.35rem;
    }
    .mt-dashboard-card {
      position: relative;
      overflow: hidden;
      min-height: 168px;
      padding: 1.05rem;
      border-radius: 22px;
      background:
        radial-gradient(circle at top right, rgba(217, 4, 41, 0.28), transparent 30%),
        linear-gradient(180deg, rgba(22, 22, 22, 0.98), rgba(8, 8, 8, 0.94));
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.38);
    }
    .mt-dashboard-card__eyebrow {
      display: inline-flex;
      padding: 0.32rem 0.62rem;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
      background: rgba(217, 4, 41, 0.14);
      border: 1px solid rgba(217, 4, 41, 0.32);
    }
    .mt-dashboard-card__title {
      margin-top: 0.9rem;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
      color: #ffffff;
    }
    .mt-dashboard-card__value {
      margin-top: 1.2rem;
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
      color: #ffffff;
    }
    .mt-dashboard-card__subtitle {
      margin-top: 0.7rem;
      color: rgba(255, 255, 255, 0.72);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="mt-dashboard-grid" id="mt-dashboard-grid"></div>
  <script>
    const cards = $payload_json;
    const root = document.getElementById("mt-dashboard-grid");
    const escapeHtml = (value) => String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
    root.innerHTML = cards.map((card, index) => `
      <article class="mt-dashboard-card">
        <div class="mt-dashboard-card__eyebrow">Metric ${index + 1}</div>
        <div class="mt-dashboard-card__title">${escapeHtml(card.title)}</div>
        <div class="mt-dashboard-card__value">${escapeHtml(card.value)}</div>
        <div class="mt-dashboard-card__subtitle">${escapeHtml(card.subtitle)}</div>
      </article>
    `).join("");
    const height = Math.min(Math.max(document.body.scrollHeight + 12, 180), 520);
    if (window.parent) {
      window.parent.postMessage({ type: "streamlit:setFrameHeight", height }, "*");
    }
  </script>
</body>
</html>
